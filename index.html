<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Duo Budget - Product Vision Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      id="lightStylesheet"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/water.css@2/out/light.css"
    />

    <link
      id="darkStylesheet"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css"
      disabled
    />
    <style>
      .top-hr{
        height: 2px;
        background-color: orange;
      }

      .bottom-hr {
        height: 2px;
        background-color: green;
      }
    </style>
    <script>
      const lightStylesheet = document.getElementById('lightStylesheet');
      const darkStylesheet = document.getElementById('darkStylesheet');

      function processQueryString() {
        const mode = new URLSearchParams(location.search).get('mode');
        if(mode === 'light') {
          lightStylesheet.disabled = false;
          darkStylesheet.disabled = true;
        } else if (mode === 'dark') {
          lightStylesheet.disabled = true;
          darkStylesheet.disabled = false;
        }
      }

      function toggleDarkMode() {
        lightStylesheet.disabled = !lightStylesheet.disabled;
        darkStylesheet.disabled = !darkStylesheet.disabled;
      }

      document.addEventListener('DOMContentLoaded', function() {
        processQueryString();

        const toggleButton = document.getElementById('toggle-dark-mode');
        toggleButton.addEventListener('click', toggleDarkMode);
      });
    </script>
  </head>
  <body>
    <header>
      <h1>Duo Budget - Product Vision Board</h1>
      <hr class="top-hr">
      <hr class="bottom-hr">
      <nav>
        <button id="toggle-dark-mode">Toggle dark mode</button>
      </nav>
    </header>
    <main>
      <section>
        <h2>Vision</h2>
        <p>
          Help people understand how <em>time</em> and <em>money</em> work
          together.
        </p>
        <p>Make clearer, more confident decisions.</p>
      </section>
    </main>
    <footer>
      <p>&copy; Duo Budget</p>
    </footer>
  </body>
</html>
